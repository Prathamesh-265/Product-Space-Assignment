services:
  - type: web
    name: taskflow-api
    env: node
    rootDir: server

    buildCommand: npm install && npm run build
    startCommand: npm start

    disk:
      name: taskflow-data
      mountPath: /data
      sizeGB: 1

    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: DATABASE_PATH
        value: /data/taskflow.db
      - key: SESSION_SECRET
        generateValue: true
      - key: CLIENT_ORIGIN
        value: https://your-app.vercel.app